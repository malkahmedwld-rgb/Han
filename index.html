<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جلسة تركيز | ساعة رملية ومطر</title>
    <style>
        :root {
            --bg-color: #121212;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --sand-color: #d4af37; /* لون ذهبي للرمل */
            --text-color: #e0e0e0;
            --primary: #8b5cf6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at center, #1f1f3a 0%, #121212 100%);
        }

        .focus-container {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            width: 90%;
            max-width: 450px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 2rem;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* تصميم الساعة الرملية بـ CSS */
        .hourglass-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
            transition: transform 0.8s ease-in-out;
        }

        .hourglass {
            width: 80px;
            height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .glass {
            width: 80px;
            height: 70px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
        }

        .glass.top {
            border-radius: 50% 50% 10px 10px;
            border-bottom: none;
        }

        .glass.bottom {
            border-radius: 10px 10px 50% 50%;
            border-top: none;
        }

        .sand {
            position: absolute;
            left: 0;
            right: 0;
            background-color: var(--sand-color);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
            transition: height 1s linear, bottom 1s linear, top 1s linear;
        }

        .top .sand {
            bottom: 0;
            height: 100%; /* يبدأ ممتلئاً */
        }

        .bottom .sand {
            bottom: 0;
            height: 0%; /* يبدأ فارغاً */
        }

        .timer-display {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
            color: #fff;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid var(--glass-border);
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        button#start {
            background: var(--primary);
            border-color: var(--primary);
            font-weight: bold;
        }

        button#start:hover {
            background: #7c3aed;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
        }

        .volume-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.9rem;
            color: var(--text-color);
        }

        input[type="range"] {
            accent-color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="focus-container">
        <h1>جلسة تركيز عميق</h1>
        
        <div class="hourglass-wrapper" id="hourglass-wrapper">
            <div class="hourglass">
                <div class="glass top">
                    <div class="sand" id="top-sand"></div>
                </div>
                <div class="glass bottom">
                    <div class="sand" id="bottom-sand"></div>
                </div>
            </div>
        </div>

        <div class="timer-display" id="time">25:00</div>

        <div class="controls">
            <button id="start">ابدأ</button>
            <button id="pause">إيقاف</button>
            <button id="reset">إعادة ضبط</button>
        </div>

        <div class="volume-control">
            <label for="volume">صوت المطر:</label>
            <input type="range" id="volume" min="0" max="1" step="0.1" value="0.5">
        </div>
    </div>

    <audio id="rain-audio" loop src="https://actions.google.com/sounds/v1/weather/rain_heavy_loud.ogg"></audio>

    <script>
        // إعدادات المؤقت (بالثواني) - 25 دقيقة افتراضياً
        const WORK_TIME = 25 * 60; 
        let timeLeft = WORK_TIME;
        let timerInterval = null;
        let isRunning = false;
        let rotationCount = 0; // لحركة قلب الساعة الرملية

        // ربط عناصر HTML
        const timeDisplay = document.getElementById('time');
        const startBtn = document.getElementById('start');
        const pauseBtn = document.getElementById('pause');
        const resetBtn = document.getElementById('reset');
        const topSand = document.getElementById('top-sand');
        const bottomSand = document.getElementById('bottom-sand');
        const hourglassWrapper = document.getElementById('hourglass-wrapper');
        const rainAudio = document.getElementById('rain-audio');
        const volumeControl = document.getElementById('volume');

        // تحديث واجهة الوقت والرمل
        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            
            // تنسيق الوقت كـ 00:00
            timeDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            // حساب النسبة المئوية المتبقية لتحديث ارتفاع الرمل
            const percentage = (timeLeft / WORK_TIME) * 100;
            
            topSand.style.height = `${percentage}%`;
            bottomSand.style.height = `${100 - percentage}%`;
        }

        // تشغيل المؤقت
        function startTimer() {
            if (isRunning) return;
            
            isRunning = true;
            rainAudio.play().catch(e => console.log("المتصفح يمنع التشغيل التلقائي للصوت حتى يتفاعل المستخدم."));
            
            timerInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateDisplay();
                } else {
                    // انتهاء الوقت
                    clearInterval(timerInterval);
                    isRunning = false;
                    rainAudio.pause();
                    alert('أحسنت! انتهت جلسة التركيز. خذ استراحة قصيرة.');
                }
            }, 1000);
        }

        // إيقاف مؤقت
        function pauseTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            rainAudio.pause();
        }

        // إعادة ضبط المؤقت
        function resetTimer() {
            pauseTimer();
            timeLeft = WORK_TIME;
            
            // إضافة حركة دوران جذابة للساعة الرملية (كأنك تقلبها)
            rotationCount += 180;
            hourglassWrapper.style.transform = `rotate(${rotationCount}deg)`;
            
            // بسبب الدوران، نعكس اتجاه حركة الرمل برمجياً حتى يبدو منطقياً
            if (rotationCount % 360 !== 0) {
                topSand.style.bottom = "auto";
                topSand.style.top = "0";
                bottomSand.style.bottom = "auto";
                bottomSand.style.top = "0";
            } else {
                topSand.style.top = "auto";
                topSand.style.bottom = "0";
                bottomSand.style.top = "auto";
                bottomSand.style.bottom = "0";
            }

            updateDisplay();
        }

        // التحكم بحجم الصوت
        volumeControl.addEventListener('input', (e) => {
            rainAudio.volume = e.target.value;
        });

        // ربط الأزرار بالدوال
        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        resetBtn.addEventListener('click', resetTimer);

        // تهيئة العرض المبدئي
        rainAudio.volume = volumeControl.value;
        updateDisplay();
    </script>
</body>
</html>
