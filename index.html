<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سينما القانون | NIMI</title>
    <style>
        /* إعدادات عامة */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0f0f0f;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* لمنع التمرير أثناء عرض الانترو */
        }

        /* حاوية فيديو المقدمة (الانترو) */
        #intro-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease-out; /* تأثير اختفاء سلس */
        }

        #intro-video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* يملأ الشاشة بالكامل */
        }

        /* حاوية المحتوى الرئيسي (مخفية في البداية) */
        #main-content {
            display: none;
            padding: 20px;
            text-align: center;
            height: 100%;
            overflow-y: auto; /* إعادة التمرير للصفحة */
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
        }

        h1 {
            color: #8b5cf6; /* لون بنفسجي نيون */
            margin-top: 50px;
        }

        p {
            font-size: 1.2rem;
            color: #ccc;
        }
    </style>
</head>
<body>

    <div id="intro-container">
        <video id="intro-video" autoplay muted playsinline>
            <source src="./vidio/intro.mp4" type="video/mp4">
            عذراً، متصفحك لا يدعم مشغل الفيديو.
        </video>
    </div>

    <div id="main-content">
        <h1>مرحباً بك في منصة NIMI</h1>
        <p>التطبيق الخاص بعرض أفلام سينما القانون.</p>
        <p>بواسطة NINA TEAM - جميع الحقوق محفوظة © 2026</p>
        
        </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const introContainer = document.getElementById('intro-container');
            const introVideo = document.getElementById('intro-video');
            const mainContent = document.getElementById('main-content');

            // دالة لإخفاء الانترو وإظهار الموقع
            function hideIntro() {
                introContainer.style.opacity = '0'; // تأثير التلاشي
                
                // بعد ثانية واحدة (مدة تأثير التلاشي)، نخفي الحاوية تماماً ونظهر المحتوى
                setTimeout(() => {
                    introContainer.style.display = 'none';
                    mainContent.style.display = 'block';
                    document.body.style.overflow = 'auto'; // إعادة تفعيل التمرير
                }, 1000);
            }

            // الحدث الذي يراقب انتهاء الفيديو
            introVideo.addEventListener('ended', hideIntro);

            // كخطة بديلة (Fallback): 
            // إذا واجه الفيديو مشكلة في التحميل أو التشغيل التلقائي بسبب سياسات المتصفح،
            // سيتم تخطي الانترو تلقائياً بعد 8 ثوانٍ ونصف.
            setTimeout(hideIntro, 8500); 
        });
    </script>
</body>
</html>
